<!DOCTYPE html>
<html lang="cs"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:{{WIDTH}}px;height:{{HEIGHT}}px;font-family:'Noto Sans','DejaVu Sans','Segoe UI',sans-serif;color:{{TEXT}};background:{{BODY_BG}};overflow:hidden;position:relative}
.bg{position:absolute;inset:0;background:url('{{BG_IMAGE}}') center/cover no-repeat;display:{{BG_DISPLAY}}}
.panel{position:absolute;left:0;top:0;bottom:12px;width:52%;background:linear-gradient(90deg,rgba(4,22,46,.96) 0%,rgba(4,22,46,.88) 72%,rgba(4,22,46,0) 100%);padding:90px 130px 90px 90px;display:flex;flex-direction:column;justify-content:center}
.kicker{color:{{SECONDARY}};font-size:28px;font-weight:700;letter-spacing:6px;text-transform:uppercase;margin-bottom:26px}
.bar{width:120px;height:8px;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});border-radius:4px;margin-bottom:30px}
h1{font-size:58px;font-weight:800;line-height:1.2;margin-bottom:34px;text-shadow:0 3px 16px rgba(0,0,0,.5)}
.body ul{list-style:none}
.body li{font-size:33px;line-height:1.45;margin-bottom:22px;padding-left:40px;position:relative;color:rgba(255,255,255,.94)}
.body li::before{content:'\25b8';position:absolute;left:0;color:{{SECONDARY}}}
.overlay{font-size:32px;color:rgba(255,255,255,.88);line-height:1.45}
.logo{position:absolute;right:48px;bottom:46px}.logo img{height:56px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.num{position:absolute;left:48px;bottom:50px;font-size:22px;color:rgba(255,255,255,.5);letter-spacing:3px}
.progress{position:absolute;left:0;right:0;bottom:0;height:12px;background:rgba(255,255,255,.14)}
.progress .fill{height:100%;width:{{PROGRESS}}%;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});border-radius:0 6px 6px 0}
</style></head><body>
<div class="bg"></div>
<div class="panel"><div class="kicker">{{KICKER}}</div><div class="bar"></div><h1>{{TITLE}}</h1><div class="body">{{BODY}}</div><div class="overlay">{{OVERLAY}}</div></div>
<div class="logo">{{LOGO_TAG}}</div><div class="num">{{SCENE_NUM}}</div>
<div class="progress"><div class="fill"></div></div>
</body></html>
