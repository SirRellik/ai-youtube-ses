<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:{{WIDTH}}px;height:{{HEIGHT}}px;font-family:'Segoe UI','Helvetica Neue',sans-serif;color:{{TEXT}};background:{{BODY_BG}};overflow:hidden;position:relative}
.bg{position:absolute;inset:0;background:url('{{BG_IMAGE}}') center/cover no-repeat;display:{{BG_DISPLAY}}}
.shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(4,22,46,.30) 0%,rgba(4,22,46,.50) 50%,rgba(4,22,46,.94) 100%)}
.content{position:absolute;left:90px;right:90px;bottom:150px}
.kicker{display:inline-block;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.25);padding:12px 30px;border-radius:40px;color:{{SECONDARY}};font-size:30px;font-weight:700;letter-spacing:6px;text-transform:uppercase;margin-bottom:30px}
.bar{width:150px;height:9px;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});border-radius:5px;margin-bottom:32px}
h1{font-size:{{TITLE_SIZE}}px;font-weight:800;line-height:1.1;text-shadow:0 4px 28px rgba(0,0,0,.7);max-width:1560px}
.overlay{margin-top:28px;font-size:38px;color:rgba(255,255,255,.92);max-width:1380px;line-height:1.42;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.logo{position:absolute;right:48px;bottom:46px}.logo img{height:56px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.num{position:absolute;left:48px;bottom:50px;font-size:22px;color:rgba(255,255,255,.5);letter-spacing:3px}
.progress{position:absolute;left:0;right:0;bottom:0;height:12px;background:rgba(255,255,255,.14)}
.progress .fill{height:100%;width:{{PROGRESS}}%;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});border-radius:0 6px 6px 0}
</style></head><body>
<div class="bg"></div><div class="shade"></div>
<div class="content"><div class="kicker">{{KICKER}}</div><div class="bar"></div><h1>{{TITLE}}</h1><div class="overlay">{{OVERLAY}}</div></div>
<div class="logo">{{LOGO_TAG}}</div><div class="num">{{SCENE_NUM}}</div>
<div class="progress"><div class="fill"></div></div>
</body></html>
