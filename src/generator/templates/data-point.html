<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:{{WIDTH}}px;height:{{HEIGHT}}px;font-family:'Segoe UI','Helvetica Neue',sans-serif;color:{{TEXT}};overflow:hidden;position:relative;
background:radial-gradient(1300px 850px at 50% 28%,#0a2a52 0%,{{BG_DARK}} 72%)}
.kicker{position:absolute;top:90px;left:0;right:0;text-align:center;color:{{SECONDARY}};font-size:30px;font-weight:700;letter-spacing:7px;text-transform:uppercase}
.wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 140px;text-align:center}
.big{font-size:150px;font-weight:900;line-height:1.08;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:42px}
.context{font-size:42px;line-height:1.4;color:rgba(255,255,255,.92);max-width:1450px}
.logo{position:absolute;right:48px;bottom:36px}.logo img{height:54px}
.num{position:absolute;left:48px;bottom:40px;font-size:22px;color:rgba(255,255,255,.45);letter-spacing:3px}
</style></head><body>
<div class="kicker">{{KICKER}}</div>
<div class="wrap"><div class="big">{{OVERLAY}}</div><div class="context">{{TITLE}}</div></div>
<div class="logo">{{LOGO_TAG}}</div><div class="num">{{SCENE_NUM}}</div>
</body></html>
