<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:{{WIDTH}}px;height:{{HEIGHT}}px;font-family:'Segoe UI','Helvetica Neue',sans-serif;color:{{TEXT}};overflow:hidden;position:relative;
background:radial-gradient(1400px 900px at 50% 20%,#0c2f5c 0%,{{BG_DARK}} 75%)}
.wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 120px}
.logo-big img{height:110px;margin-bottom:48px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
.kicker{color:{{SECONDARY}};font-size:28px;font-weight:700;letter-spacing:7px;text-transform:uppercase;margin-bottom:26px}
h1{font-size:80px;font-weight:800;line-height:1.15;max-width:1500px}
.features{display:flex;gap:26px;margin:46px 0 10px;flex-wrap:wrap;justify-content:center}
.chip{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);padding:20px 38px;border-radius:50px;font-size:30px;font-weight:600}
.site{margin-top:34px;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});padding:28px 72px;border-radius:60px;font-size:46px;font-weight:800;letter-spacing:1px;box-shadow:0 10px 40px rgba(0,102,204,.45)}
.num{position:absolute;left:48px;bottom:40px;font-size:22px;color:rgba(255,255,255,.45);letter-spacing:3px}
</style></head><body>
<div class="wrap">
  <div class="logo-big">{{LOGO_TAG}}</div>
  <div class="kicker">{{KICKER}}</div>
  <h1>{{TITLE}}</h1>
  <div class="features">{{BODY}}</div>
  <div class="site">{{OVERLAY}}</div>
</div>
<div class="num">{{SCENE_NUM}}</div>
</body></html>
