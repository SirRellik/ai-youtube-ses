<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:{{WIDTH}}px;height:{{HEIGHT}}px;font-family:'Segoe UI','Helvetica Neue',sans-serif;color:{{TEXT}};background:{{BODY_BG}};overflow:hidden;position:relative}
.bg{position:absolute;inset:0;background:url('{{BG_IMAGE}}') center/cover no-repeat;display:{{BG_DISPLAY}}}
.shade{position:absolute;inset:0;background:linear-gradient(160deg,rgba(8,32,63,.93) 0%,rgba(4,22,46,.88) 60%,rgba(4,22,46,.84) 100%)}
.header{position:absolute;top:80px;left:90px;right:90px}
.kicker{color:{{SECONDARY}};font-size:28px;font-weight:700;letter-spacing:6px;text-transform:uppercase;margin-bottom:20px}
h1{font-size:54px;font-weight:800;line-height:1.2;text-shadow:0 3px 16px rgba(0,0,0,.5)}
.cols{position:absolute;top:330px;left:90px;right:90px;bottom:160px;display:flex;gap:56px}
.col{flex:1;background:rgba(255,255,255,.08);border-top:8px solid {{PRIMARY}};border-radius:18px;padding:44px;font-size:34px;line-height:1.5;box-shadow:0 4px 24px rgba(0,0,0,.25)}
.col:last-child{border-top-color:{{SECONDARY}}}
.col-label{font-size:25px;letter-spacing:4px;font-weight:700;color:{{SECONDARY}};margin-bottom:24px}
.col:first-child .col-label{color:#5aa9ff}
.col p{margin-bottom:18px}
.logo{position:absolute;right:48px;bottom:46px}.logo img{height:56px}
.num{position:absolute;left:48px;bottom:50px;font-size:22px;color:rgba(255,255,255,.5);letter-spacing:3px}
.progress{position:absolute;left:0;right:0;bottom:0;height:12px;background:rgba(255,255,255,.14)}
.progress .fill{height:100%;width:{{PROGRESS}}%;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});border-radius:0 6px 6px 0}
</style></head><body>
<div class="bg"></div><div class="shade"></div>
<div class="header"><div class="kicker">{{KICKER}}</div><h1>{{TITLE}}</h1></div>
<div class="cols">{{BODY}}</div>
<div class="logo">{{LOGO_TAG}}</div><div class="num">{{SCENE_NUM}}</div>
<div class="progress"><div class="fill"></div></div>
</body></html>
