<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:{{WIDTH}}px;height:{{HEIGHT}}px;font-family:'Segoe UI','Helvetica Neue',sans-serif;color:{{TEXT}};background:{{BG_DARK}};overflow:hidden;position:relative}
.bg{position:absolute;inset:0;background:url('{{BG_IMAGE}}') center/cover no-repeat}
.shade{position:absolute;inset:0;background:linear-gradient(100deg,rgba(4,22,46,.95) 0%,rgba(4,22,46,.75) 45%,rgba(4,22,46,.25) 100%)}
.content{position:absolute;left:60px;right:380px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center}
.badge{display:inline-block;align-self:flex-start;background:{{SECONDARY}};color:#fff;padding:10px 26px;font-size:26px;font-weight:800;border-radius:8px;letter-spacing:2px;margin-bottom:28px}
.big{font-size:96px;font-weight:900;line-height:1.04;text-transform:uppercase;text-shadow:0 6px 24px rgba(0,0,0,.85)}
.small{margin-top:26px;font-size:32px;font-weight:500;color:rgba(255,255,255,.9);line-height:1.3;text-shadow:0 3px 12px rgba(0,0,0,.8)}
.bar{width:140px;height:10px;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});border-radius:5px;margin-top:30px}
.logo{position:absolute;right:40px;bottom:32px}.logo img{height:60px;filter:drop-shadow(0 3px 10px rgba(0,0,0,.6))}
</style></head><body>
<div class="bg"></div><div class="shade"></div>
<div class="content"><span class="badge">ENERGIE</span><div class="big">{{THUMB_TEXT}}</div><div class="small">{{TITLE}}</div><div class="bar"></div></div>
<div class="logo">{{LOGO_TAG}}</div>
</body></html>
