<!DOCTYPE html>
<html lang="cs"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:{{WIDTH}}px;height:{{HEIGHT}}px;font-family:'Noto Sans','DejaVu Sans','Segoe UI',sans-serif;color:{{TEXT}};background:{{BG_DARK}};overflow:hidden;position:relative}
.bg{position:absolute;inset:0;background:url('{{BG_IMAGE}}') center/cover no-repeat}
.shade{position:absolute;inset:0;background:linear-gradient(100deg,rgba(4,22,46,.96) 0%,rgba(4,22,46,.78) 45%,rgba(4,22,46,.18) 100%)}
.glow{position:absolute;left:-180px;top:-180px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,{{SECONDARY}}40 0%,transparent 70%)}
.content{position:absolute;left:60px;right:360px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center}
.badge{display:inline-block;align-self:flex-start;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});color:#fff;padding:12px 30px;font-size:27px;font-weight:800;border-radius:10px;letter-spacing:3px;margin-bottom:30px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.big{font-size:100px;font-weight:900;line-height:1.02;text-transform:uppercase;text-shadow:0 6px 28px rgba(0,0,0,.9);-webkit-text-stroke:2px rgba(0,0,0,.25)}
.small{margin-top:28px;font-size:34px;font-weight:600;color:rgba(255,255,255,.94);line-height:1.3;text-shadow:0 3px 12px rgba(0,0,0,.85)}
.bar{width:160px;height:12px;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}});border-radius:6px;margin-top:32px}
.logo{position:absolute;right:40px;bottom:32px}.logo img{height:64px;filter:drop-shadow(0 3px 10px rgba(0,0,0,.6))}
.edge{position:absolute;left:0;right:0;bottom:0;height:14px;background:linear-gradient(90deg,{{PRIMARY}},{{SECONDARY}})}
</style></head><body>
<div class="bg"></div><div class="shade"></div><div class="glow"></div>
<div class="content"><span class="badge">ENERGIE</span><div class="big">{{THUMB_TEXT}}</div><div class="small">{{TITLE}}</div><div class="bar"></div></div>
<div class="logo">{{LOGO_TAG}}</div>
<div class="edge"></div>
</body></html>
